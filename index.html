<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Viagel | Junior IT & Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: #f8fafc; line-height: 1.6; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%); z-index: -1; }
        .container { max-width: 900px; margin: 60px auto; padding: 20px; }

        header {
            text-align: center;
            padding: 60px 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            margin-bottom: 40px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; }
        .subtitle { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; margin-top: 10px; }
        .badge { display: inline-block; background: rgba(99, 102, 241, 0.2); color: var(--primary); padding: 4px 12px; border-radius: 100px; font-size: 0.8rem; border: 1px solid var(--primary); margin-bottom: 15px; }

        section { background: var(--glass); border: 1px solid var(--border); padding: 30px; border-radius: 24px; margin-bottom: 20px; transition: 0.3s; }
        section:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        h2 { color: var(--primary); font-size: 1.5rem; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item { border-left: 2px solid var(--border); padding-left: 20px; margin-bottom: 15px; }
        .item h4 { margin: 0; color: #fff; }
        .item span { font-size: 0.85rem; color: #94a3b8; }

        .contact-links { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn { text-decoration: none; color: #fff; padding: 10px 20px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.9rem; background: rgba(255,255,255,0.05); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--primary); transform: translateY(-3px); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span class="badge">Cloud Enthusiast</span>
            <h1>Jorge Viagel López</h1>
            <div class="subtitle">Junior IT
